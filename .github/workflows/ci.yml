name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Lint, typecheck, build, and links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.18.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm types:check

      - name: Build
        run: pnpm build

      - name: Check internal links
        run: |
          pnpm exec next start -H 127.0.0.1 &
          for i in {1..30}; do
            curl -sf http://127.0.0.1:3000/welcome >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/welcome >/dev/null
          pnpm check:links
